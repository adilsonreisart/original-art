<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adilson Reisart | Original Gallery</title>
    <style>
        /* CONFIGURAÇÕES GERAIS - MINIMALISMO */
        body {
            margin: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #ffffff; /* Fundo Branco */
            color: #000000; /* Texto Preto */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            padding: 40px 20px;
            text-align: center;
            border-bottom: 1px solid #eeeeee;
            width: 100%;
        }

        header h1 {
            margin: 0;
            font-size: 2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        header span {
            color: #ff0000; /* Detalhe em Vermelho */
        }

        /* GALERIA DE IMAGENS */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 40px;
            padding: 40px 20px;
            max-width: 1200px;
            width: 100%;
        }

        .art-card {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* FORMATO RETRATO (PROPORÇÃO A4) */
        .thumbnail-container {
            width: 100%;
            aspect-ratio: 1 / 1.41; /* Proporção A4 */
            overflow: hidden;
            background-color: #f9f9f9;
            cursor: pointer;
            border: 1px solid #f0f0f0;
            transition: transform 0.3s ease;
        }

        .thumbnail-container:hover {
            transform: scale(1.02);
        }

        .thumbnail-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .art-info {
            text-align: center;
            margin-top: 15px;
        }

        .art-title {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        /* BOTÃO BUY NOW (PAYPAL) */
        .buy-button {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 30px;
            background-color: #ff0000; /* Vermelho */
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8rem;
            border-radius: 2px;
            transition: background 0.3s;
        }

        .buy-button:hover {
            background-color: #000000; /* Muda para preto no hover */
        }

        /* MODAL PARA EXPANDIR IMAGEM */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 255, 255, 0.98);
            justify-content: center;
            align-items: center;
        }

        .modal img {
            max-width: 90%;
            max-height: 90vh;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* RESPONSIVIDADE */
        @media (max-width: 600px) {
            header h1 { font-size: 1.5rem; }
            .gallery { grid-template-columns: 1fr; padding: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Adilson <span>Reisart</span></h1>
        <p>Original Hand-drawn Illustrations</p>
    </header>

    <main class="gallery">
        <div class="art-card">
            <div class="thumbnail-container" onclick="openModal('img1.jpg')">
                <img src="URL_DA_SUA_IMAGEM_1" alt="Original Art">
            </div>
            <div class="art-info">
                <div class="art-title">Gambit Original</div>
                <div class="price">US$ 150.00</div>
                <a href="https://www.paypal.com/cgi-bin/webscr?..." class="buy-button">Buy Now</a>
            </div>
        </div>

        </main>

    <div id="imageModal" class="modal" onclick="closeModal()">
        <img id="modalImg" src="">
    </div>

    <script>
        function openModal(imgSrc) {
            document.getElementById('modalImg').src = imgSrc;
            document.getElementById('imageModal').style.display = 'flex';
        }
        function closeModal() {
            document.getElementById('imageModal').style.display = 'none';
        }
    </script>

</body>
</html>
