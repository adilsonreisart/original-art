<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adilson Reisart | Original Art Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-red: #e63946;
            --dark-black: #1a1a1a;
            --clean-white: #ffffff;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--clean-white);
            color: var(--dark-black);
            margin: 0;
            padding: 0;
        }

        /* BARRA DE NAVEGAÇÃO SUPERIOR */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 2px solid var(--primary-red);
        }

        /* Redes Sociais no lado ESQUERDO */
        .social-icons {
            display: flex;
            gap: 20px;
        }

        .social-icons a {
            color: var(--dark-black);
            font-size: 1.2rem;
            transition: color 0.3s;
        }

        .social-icons a:hover {
            color: var(--primary-red);
        }

        /* Nome Centralizado */
        .brand-name {
            text-align: center;
        }

        .brand-name h1 {
            letter-spacing: 5px;
            font-size: 1.8rem;
            margin: 0;
            font-weight: 800;
        }

        /* Menu de Navegação no lado DIREITO */
        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--dark-black);
            font-weight: bold;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-links a:hover {
            color: var(--primary-red);
        }

        /* GALERIA */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .art-card {
            background: white;
            padding: 15px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .art-card:hover {
            transform: translateY(-5px);
        }

        .art-card img {
            width: 100%;
            height: auto;
            border: 1px solid #eee;
        }

        .art-info h3 {
            margin: 15px 0 5px 0;
            font-size: 1.2rem;
        }

        .art-info p {
            color: #666;
            margin-bottom: 15px;
        }

        /* BOTÃO BUY NOW */
        .buy-btn {
            display: inline-block;
            background-color: var(--dark-black);
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            transition: background 0.3s ease;
        }

        .buy-btn:hover {
            background-color: var(--primary-red);
        }

        footer {
            text-align: center;
            padding: 60px 40px;
            font-size: 0.8rem;
            color: #999;
        }

        /* Ajuste para Celular */
        @media (max-width: 768px) {
            nav {
                flex-direction: column;
                gap: 20px;
            }
        }
    </style>
</head>
<body>

    <nav>
        <div class="social-icons">
            <a href="https://facebook.com" target="_blank"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="https://instagram.com/reisart2" target="_blank"><i class="fa-brands fa-instagram"></i></a>
        </div>

        <div class="brand-name">
            <h1>ADILSON REISART</h1>
        </div>

        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#" style="color: var(--primary-red);">Gallery</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>
    </nav>

    <main class="gallery">
        
        <div class="art-card">
            <img src="gambit.jpg" alt="Gambit Original Art">
            <div class="art-info">
                <h3>GAMBIT</h3>
                <p>Original Art - Traditional Media</p>
                <a href="#" class="buy-btn">BUY NOW</a>
            </div>
        </div>

        <div class="art-card">
            <img src="anissa.jpg" alt="Anissa Original Art">
            <div class="art-info">
                <h3>ANISSA</h3>
                <p>Original Art - Traditional Media</p>
                <a href="#" class="buy-btn">BUY NOW</a>
            </div>
        </div>

    </main>

    <footer>
        &copy; 2026 ADILSON REISART. All rights reserved.
    </footer>

</body>
</html>
