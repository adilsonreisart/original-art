<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adilson Reisart | Original Art Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-red: #e63946;
            --dark-black: #1a1a1a;
            --clean-white: #ffffff;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--clean-white);
            color: var(--dark-black);
            margin: 0;
            padding: 0;
        }

        /* BARRA DE NAVEGAÇÃO SUPERIOR */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 2px solid var(--primary-red);
        }

        /* Menu de Navegação no lado ESQUERDO */
        .nav-links {
            display: flex;
            gap: 20px;
            flex: 1; /* Garante que o menu ocupe espaço para equilibrar o layout */
        }

        .nav-links a {
            text-decoration: none;
            color: var(--dark-black);
            font-weight: bold;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary-red);
        }

        /* Nome Centralizado */
        .brand-name {
            flex: 1;
            text-align: center;
        }

        .brand-name h1 {
            letter-spacing: 5px;
            font-size: 1.8rem;
            margin: 0;
            font-weight: 800;
            white-space: nowrap;
        }

        /* Redes Sociais no lado DIREITO */
        .social-icons {
            display: flex;
            gap: 20px;
            flex: 1;
            justify-content: flex-end; /* Alinha os ícones ao final (direita) */
        }

        .social-icons a {
            color: var(--dark-black);
            font-size: 1.2rem;
            transition: color 0.3s;
        }

        .social-icons a:hover {
            color: var(--primary-red);
        }

        /* GALERIA */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .art-card {
            background: white;
            padding: 15px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .art-card:hover {
            transform: translateY(-5px);
        }

        .art-card img {
            width: 100%;
            height: auto;
            border: 1px solid #eee;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .art-info h3 {
            margin: 15px 0 5px 0;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .art-info p {
            color: #666;
